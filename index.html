<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
     <h1 class="h1">Calculator</h1>
    <div class="container">
        <div class="calculator">
            <input type="text" id="display" class="display" disabled>
            <div id="buttons" class="buttons">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button type="reset">C</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>%</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
                <button>.</button>
                <button>-</button>
                <button>+</button>
                <button>=</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
